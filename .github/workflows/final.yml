name: GitHub Release & Direct Link Fetcher

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL (GitHub release/tag URL, GitHub asset URL, or any direct link)'
        required: true
      filename:
        description: 'Optional: save as (for direct links only)'
        required: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean workspace (keep only workflow file)
        run: |
          find . -maxdepth 1 -type f -delete
          find . -maxdepth 1 -type d -not -name '.git' -not -name '.github' -not -name '.' -exec rm -rf {} + 2>/dev/null || true
          git checkout HEAD -- .github/workflows/github-and-direct-fetcher.yml 2>/dev/null || true

      - name: Install p7zip (if not cached)
        run: |
          if ! command -v 7z &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y p7zip-full
          else
            echo "p7zip already installed"
          fi

      - name: Install gh CLI (if not present)
        run: |
          if ! command -v gh &> /dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update && sudo apt install -y gh
          else
            echo "gh CLI already installed"
          fi

      - name: Process GitHub release tag URL
        if: contains(github.event.inputs.url, '/releases/tag/')
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          URL="${{ github.event.inputs.url }}"
          echo "::group::🏷️ GitHub release tag detected"
          REPO_PATH=$(echo "$URL" | sed -E 's|https?://github.com/([^/]+/[^/]+)/releases/tag/.*|\1|')
          TAG=$(echo "$URL" | sed -E 's|.*/releases/tag/||' | sed 's|/?$||')
          REPO_NAME=$(basename "$REPO_PATH")
          mkdir -p release_assets
          cd release_assets
          gh release download "$TAG" --repo "$REPO_PATH" --clobber
          echo "Downloaded files:"
          ls -la
          cd ..
          7z a -mx9 "${REPO_NAME}-${TAG}.7z" ./release_assets/*
          rm -rf release_assets
          FINAL_NAME="${REPO_NAME}-${TAG}.7z"
          echo "FILE_NAME=$FINAL_NAME" >> $GITHUB_ENV
          echo "::endgroup::"

      - name: Process GitHub direct asset URL
        if: contains(github.event.inputs.url, '/releases/download/') && !contains(github.event.inputs.url, '/releases/tag/')
        run: |
          URL="${{ github.event.inputs.url }}"
          echo "::group::📦 GitHub direct asset download"
          OUTPUT_NAME=$(basename "$URL" | sed 's/\?.*//')
          [ -z "$OUTPUT_NAME" ] && OUTPUT_NAME="github_asset"
          curl -L -o "$OUTPUT_NAME" --fail --retry 3 "$URL"
          echo "FILE_NAME=$OUTPUT_NAME" >> $GITHUB_ENV
          echo "::endgroup::"

      - name: Process direct link (fallback)
        if: env.FILE_NAME == '' && !contains(github.event.inputs.url, '/releases/tag/') && !(contains(github.event.inputs.url, '/releases/download/') && !contains(github.event.inputs.url, '/releases/tag/'))
        run: |
          URL="${{ github.event.inputs.url }}"
          CUSTOM_NAME="${{ github.event.inputs.filename }}"
          if [ -n "$CUSTOM_NAME" ]; then
            OUTPUT_NAME="$CUSTOM_NAME"
          else
            OUTPUT_NAME=$(basename "$URL" | sed 's/\?.*//')
            [ -z "$OUTPUT_NAME" ] && OUTPUT_NAME="downloaded_file"
          fi
          curl -L -o "$OUTPUT_NAME" --fail --retry 3 "$URL"
          echo "FILE_NAME=$OUTPUT_NAME" >> $GITHUB_ENV

      - name: Split large file into 95MB 7z volumes (if >100MB)
        run: |
          FILE="$FILE_NAME"
          if [[ "$FILE" == *.7z ]]; then
            echo "File already a 7z archive, no split needed"
            echo "FILE_ARCHIVED=false" >> $GITHUB_ENV
            exit 0
          fi
          SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE" 2>/dev/null)
          if [ "$SIZE" -gt 104857600 ]; then
            echo "Splitting into 95MB volumes"
            7z a -v95m -mx9 archive.7z "$FILE"
            rm -f "$FILE"
            # Rename volumes to a predictable pattern
            for f in archive.7z.0*; do mv "$f" "${f/archive.7z./chunk_}" 2>/dev/null || true; done
            touch SPLIT
            echo "FILE_ARCHIVED=true" >> $GITHUB_ENV
          else
            echo "File ≤100MB, no split"
            echo "FILE_ARCHIVED=false" >> $GITHUB_ENV
          fi

      - name: Delete all previous tags (API + git)
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git fetch --tags
          for tag in $(git tag); do
            echo "Deleting tag: $tag"
            git tag -d "$tag" 2>/dev/null || true
            git push origin --delete "$tag" 2>/dev/null || true
            curl -X DELETE -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$tag" 2>/dev/null || true
          done

      - name: Remove unwanted prefix from filename (if any)
        run: |
          echo "Original FILE_NAME: $FILE_NAME"
          CLEAN_NAME=$(echo "$FILE_NAME" | sed 's/^release-downloader-fetch-//g')
          echo "Cleaned: $CLEAN_NAME"
          echo "FILE_NAME=$CLEAN_NAME" >> $GITHUB_ENV

      - name: Prepare files for commit
        run: |
          if [ "$FILE_ARCHIVED" = "true" ]; then
            # We have chunk_* files
            ls -la chunk_*
          else
            # Single file
            ls -la "$FILE_NAME"
          fi

      - name: Git add and commit with retry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          # Increase http buffer for large pushes
          git config http.postBuffer 524288000  # 500MB
          for i in 1 2 3; do
            git commit -m "Fetch: ${{ github.event.inputs.url }}"
            if git push origin main --force; then
              echo "Push succeeded"
              exit 0
            else
              echo "Push failed (attempt $i), waiting 10 seconds..."
              sleep 10
            fi
          done
          echo "Push failed after 3 attempts"
          exit 1

      - name: Create lightweight tag (no release assets)
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          TAG_NAME="${{ env.FILE_NAME }}-${{ github.run_id }}"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Show final codeload URL
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║                         ✅ SUCCESS                               ║"
          echo "╠══════════════════════════════════════════════════════════════════╣"
          echo "║  DOWNLOAD YOUR FILE FROM THIS URL:                               ║"
          echo "║  https://codeload.github.com/${{ github.repository }}/zip/refs/tags/${{ env.TAG_NAME }}"
          echo "║                                                              ║"
          if [ -f SPLIT ]; then
            echo "║  ℹ️  The file was split into 7z volumes. Extract with ZArchiver.  ║"
          fi
          echo "╚══════════════════════════════════════════════════════════════════╝"
          echo ""
