name: Universal File Fetcher

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL (YouTube, MediaFire, Google Drive, GitHub release asset, direct link)'
        required: true
      filename:
        description: 'Optional: save as (overrides auto‑detected name)'
        required: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean workspace (keep only workflow file)
        run: |
          find . -maxdepth 1 -type f -delete
          find . -maxdepth 1 -type d -not -name '.git' -not -name '.github' -not -name '.' -exec rm -rf {} + 2>/dev/null || true
          git checkout HEAD -- .github/workflows/universal-fetcher.yml 2>/dev/null || true

      - name: Install dependencies (p7zip, ffmpeg, yt-dlp)
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Download file from URL
        id: download
        env:
          URL: ${{ github.event.inputs.url }}
          CUSTOM_NAME: ${{ github.event.inputs.filename }}
        run: |
          set -e

          # ------------------------------------------------------------
          # 1. YouTube video (best 480p, fallback 360p)
          # ------------------------------------------------------------
          if [[ "$URL" =~ (youtube\.com|youtu\.be) ]]; then
            echo "::group::📺 Downloading YouTube video"
            CLEAN_URL=$(echo "$URL" | sed 's/?si=.*//' | sed 's/&si=.*//')
            yt-dlp -f "bestvideo[height<=480]+bestaudio/best[height<=480]" \
                   --merge-output-format mp4 \
                   --no-check-certificate \
                   --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                   --no-playlist \
                   -o "%(title)s.%(ext)s" \
                   "$CLEAN_URL" || \
            yt-dlp -f "bestvideo[height<=360]+bestaudio/best[height<=360]" \
                   --merge-output-format mp4 \
                   --no-check-certificate \
                   --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                   --no-playlist \
                   -o "%(title)s.%(ext)s" \
                   "$CLEAN_URL"
            DOWNLOADED_FILE=$(ls *.mp4 *.mkv *.webm 2>/dev/null | head -1)
            echo "::endgroup::"
          fi

          # ------------------------------------------------------------
          # 2. MediaFire (extract direct link)
          # ------------------------------------------------------------
          if [[ "$URL" =~ mediafire\.com ]]; then
            echo "::group::📦 MediaFire download"
            PAGE=$(curl -sL "$URL")
            DIRECT_URL=$(echo "$PAGE" | grep -oP 'https?://download[^\s"'\'']+' | head -1)
            [ -z "$DIRECT_URL" ] && DIRECT_URL=$(echo "$PAGE" | grep -oP 'https?://[^\s"'\''"]+\.mediafire\.com/[^\s"'\''"]+' | head -1)
            FILENAME_FROM_URL=$(basename "$DIRECT_URL" | sed 's/\?.*//')
            curl -L -o "$FILENAME_FROM_URL" "$DIRECT_URL"
            DOWNLOADED_FILE="$FILENAME_FROM_URL"
            echo "::endgroup::"
          fi

          # ------------------------------------------------------------
          # 3. Google Drive (handle confirmation)
          # ------------------------------------------------------------
          if [[ "$URL" =~ drive\.google\.com ]]; then
            echo "::group::☁️ Google Drive download"
            FILE_ID=$(echo "$URL" | grep -oP 'id=\K[a-zA-Z0-9_-]+')
            [ -z "$FILE_ID" ] && FILE_ID=$(echo "$URL" | grep -oP '/d/\K[a-zA-Z0-9_-]+')
            curl -sc cookies.txt "https://drive.google.com/uc?export=download&id=$FILE_ID" > confirm.html
            CONFIRM=$(grep -oP 'confirm=\K[a-zA-Z0-9_-]+' confirm.html | head -1)
            if [ -n "$CONFIRM" ]; then
              curl -Lb cookies.txt -o "drive_file" "https://drive.google.com/uc?export=download&id=$FILE_ID&confirm=$CONFIRM"
            else
              curl -Lb cookies.txt -o "drive_file" "https://drive.google.com/uc?export=download&id=$FILE_ID"
            fi
            # Try to extract original filename from Content-Disposition
            FILENAME=$(curl -sLJb cookies.txt -D - "https://drive.google.com/uc?export=download&id=$FILE_ID" 2>/dev/null | grep -oP 'filename="\K[^"]+' | head -1)
            if [ -z "$FILENAME" ]; then
              FILENAME="drive_file"
            else
              mv drive_file "$FILENAME"
            fi
            DOWNLOADED_FILE="$FILENAME"
            rm -f cookies.txt confirm.html
            echo "::endgroup::"
          fi

          # ------------------------------------------------------------
          # 4. GitHub release asset (direct download)
          # ------------------------------------------------------------
          if [[ "$URL" =~ github\.com.*/releases/download/ ]]; then
            echo "::group::🐙 GitHub release asset"
            OUTPUT_NAME="$CUSTOM_NAME"
            if [ -z "$OUTPUT_NAME" ]; then
              OUTPUT_NAME=$(basename "$URL" | sed 's/\?.*//')
            fi
            curl -L -o "$OUTPUT_NAME" "$URL"
            DOWNLOADED_FILE="$OUTPUT_NAME"
            echo "::endgroup::"
          fi

          # ------------------------------------------------------------
          # 5. Fallback: direct link (any other URL)
          # ------------------------------------------------------------
          if [ -z "$DOWNLOADED_FILE" ]; then
            echo "::group::🌐 Direct download"
            OUTPUT_NAME="$CUSTOM_NAME"
            if [ -z "$OUTPUT_NAME" ]; then
              # Try to extract filename from URL
              OUTPUT_NAME=$(basename "$URL" | sed 's/\?.*//')
              if [ -z "$OUTPUT_NAME" ] || [ "$OUTPUT_NAME" = "/" ]; then
                OUTPUT_NAME="downloaded_file"
              fi
            fi
            curl -L -o "$OUTPUT_NAME" "$URL"
            DOWNLOADED_FILE="$OUTPUT_NAME"
            echo "::endgroup::"
          fi

          # Verify file exists
          if [ ! -f "$DOWNLOADED_FILE" ]; then
            echo "❌ Download failed: no file produced"
            exit 1
          fi

          echo "FILE_NAME=$DOWNLOADED_FILE" >> $GITHUB_ENV
          echo "✅ Downloaded: $DOWNLOADED_FILE"

      - name: Split large file (>100MB) into 95MB 7z volumes
        run: |
          FILE="$FILE_NAME"
          SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE" 2>/dev/null)
          if [ "$SIZE" -gt 104857600 ]; then
            echo "📦 File size $SIZE bytes > 100MB, splitting into 95MB 7z volumes"
            7z a -v95m -mx9 archive.7z "$FILE"
            rm -f "$FILE"
            touch SPLIT
            echo "FILE_ARCHIVED=true" >> $GITHUB_ENV
          else
            echo "✅ File size $SIZE bytes ≤ 100MB, no split needed"
            echo "FILE_ARCHIVED=false" >> $GITHUB_ENV
          fi

      - name: Delete all previous tags
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git fetch --tags
          for tag in $(git tag); do
            echo "Deleting old tag: $tag"
            git tag -d "$tag" 2>/dev/null || true
            git push origin --delete "$tag" 2>/dev/null || true
            if [ -n "$GH_TOKEN" ]; then
              curl -X DELETE -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$tag" \
                2>/dev/null || true
            fi
          done

      - name: Commit and push to default branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fetch: ${{ github.event.inputs.url }}"
          git push origin main --force

      - name: Create release tag with descriptive name
        uses: softprops/action-gh-release@v2
        with:
          tag_name: fetch-${{ env.FILE_NAME }}-${{ github.run_id }}
          name: "${{ env.FILE_NAME }}"
          body: |
            Source: ${{ github.event.inputs.url }}
            Auto‑fetched by Universal Fetcher.
          files: |
            ${{ env.FILE_ARCHIVED == 'true' && 'archive.7z.*' || env.FILE_NAME }}
            !.git
            !.github

      - name: Show final codeload URL
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║                         ✅ SUCCESS                               ║"
          echo "╠══════════════════════════════════════════════════════════════════╣"
          echo "║  DOWNLOAD YOUR FILE FROM THIS URL:                               ║"
          echo "║  https://codeload.github.com/${{ github.repository }}/zip/refs/tags/fetch-${{ env.FILE_NAME }}-${{ github.run_id }}"
          echo "║                                                              ║"
          if [ -f SPLIT ]; then
            echo "║  ℹ️  The file was split into 7z volumes. Extract with ZArchiver.  ║"
          fi
          echo "╚══════════════════════════════════════════════════════════════════╝"
          echo ""
