name: Dynamic Batch Split (1.9GB per Batch)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct download URL (or GitHub asset link)'
        required: true
      filename:
        description: 'Optional: custom output filename (without extension)'
        required: false

jobs:
  nested:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean workspace (keep only workflow file)
        run: |
          find . -maxdepth 1 -type f -delete
          find . -maxdepth 1 -type d -not -name '.git' -not -name '.github' -not -name '.' -exec rm -rf {} + 2>/dev/null || true
          git checkout HEAD -- .github/workflows/dynamic-batch.yml 2>/dev/null || true

      - name: Install p7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Download file
        run: |
          URL="${{ github.event.inputs.url }}"
          CUSTOM="${{ github.event.inputs.filename }}"
          if [ -n "$CUSTOM" ]; then
            OUT="$CUSTOM"
          else
            OUT=$(basename "$URL" | sed 's/\?.*//')
            [ -z "$OUT" ] && OUT="downloaded_file"
          fi
          curl -L -o "$OUT" --fail --retry 3 "$URL"
          echo "FILE=$OUT" >> $GITHUB_ENV

      # Step 1: Create inner 95MB 7z volumes (sorted numbering)
      - name: Split into inner 7z volumes (95MB each)
        run: |
          7z a -v95m -mx9 inner.7z "$FILE"
          rm -f "$FILE"
          i=1
          for f in inner.7z.*; do
            mv "$f" "$(printf "inner_%03d.7z" $i)"
            ((i++))
          done
          echo "INNER_COUNT=$((i-1))" >> $GITHUB_ENV

      # Step 2: Group inner volumes into batches where total size ≤ 1.9GB (dynamic)
      - name: Group inner volumes into batches (max 1.9GB per batch)
        run: |
          inner_files=(inner_*.7z)
          BATCH_SIZE_LIMIT=1900000000   # 1.9 GB in bytes
          batch_num=1
          current_batch=()
          current_size=0

          for f in "${inner_files[@]}"; do
            size=$(stat -c%s "$f")
            if (( current_size + size > BATCH_SIZE_LIMIT )) && (( ${#current_batch[@]} > 0 )); then
              # Finalize current batch
              echo "Batch $batch_num: ${#current_batch[@]} files, $current_size bytes"
              # Pack these inner files into a single 7z archive
              7z a -mx0 "batch_${batch_num}.7z" "${current_batch[@]}"
              # Split that archive into 95MB outer volumes
              7z a -v95m -mx9 "outer_${batch_num}.7z" "batch_${batch_num}.7z"
              rm -f "batch_${batch_num}.7z"
              # Rename outer volumes to batch_XXX_part_YYY.7z
              part=1
              for vol in outer_${batch_num}.7z.*; do
                mv "$vol" "$(printf "batch_%03d_part_%03d.7z" $batch_num $part)"
                ((part++))
              done
              ((batch_num++))
              current_batch=()
              current_size=0
            fi
            current_batch+=("$f")
            current_size=$((current_size + size))
          done

          # Final batch
          if [ ${#current_batch[@]} -gt 0 ]; then
            echo "Batch $batch_num: ${#current_batch[@]} files, $current_size bytes"
            7z a -mx0 "batch_${batch_num}.7z" "${current_batch[@]}"
            7z a -v95m -mx9 "outer_${batch_num}.7z" "batch_${batch_num}.7z"
            rm -f "batch_${batch_num}.7z"
            part=1
            for vol in outer_${batch_num}.7z.*; do
              mv "$vol" "$(printf "batch_%03d_part_%03d.7z" $batch_num $part)"
              ((part++))
            done
          fi
          echo "BATCH_COUNT=$batch_num" >> $GITHUB_ENV

      # Step 3: Delete all old batch-* and manifest-* tags
      - name: Delete old tags
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git fetch --tags
          for tag in $(git tag | grep -E '^(batch-|manifest-)'); do
            echo "Deleting old tag: $tag"
            git tag -d "$tag" 2>/dev/null || true
            git push origin --delete "$tag" 2>/dev/null || true
            curl -X DELETE -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$tag" 2>/dev/null || true
          done

      # Step 4: Push each batch as a separate tag (all its part files)
      - name: Push batches as tags
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 209715200

          # Collect part files per batch
          declare -A batch_parts
          for f in batch_*_part_*.7z; do
            batch=$(echo "$f" | grep -oP 'batch_\K[0-9]+')
            batch_parts["$batch"]+="$f "
          done

          for batch in "${!batch_parts[@]}"; do
            tag_name="batch-$batch"
            echo "Creating tag $tag_name with parts: ${batch_parts[$batch]}"

            git checkout --orphan "temp-$tag_name"
            git rm -rf . 2>/dev/null || true
            git add ${batch_parts[$batch]}
            git commit -m "Batch $batch (outer 7z volumes)"
            git tag "$tag_name"
            git push origin "$tag_name" --force

            git checkout main
            git branch -D "temp-$tag_name" 2>/dev/null || true
          done

      # Step 5: Create a manifest tag with download URLs and instructions
      - name: Create manifest tag
        run: |
          cat > README.md << EOF
          # Download URLs for the file

          Original file: ${{ env.FILE }}
          Total batches: ${{ env.BATCH_COUNT }}

          Download each batch from:
          EOF
          for i in $(seq 1 ${{ env.BATCH_COUNT }}); do
            echo "- **Batch $i**: https://codeload.github.com/${{ github.repository }}/zip/refs/tags/batch-$(printf "%03d" $i)" >> README.md
          done
          cat >> README.md << 'EOF'

          ## Reassembly on Android (ZArchiver only – no command line)

          1. Download **all** batch source zips (the links above). You will get one .zip file per batch.
          2. Extract each .zip – you will get files named `batch_001_part_001.7z`, `batch_001_part_002.7z`, `batch_002_part_001.7z`, etc.
          3. Put **all** extracted `.7z` files (from all batches) into the same folder on your device.
          4. Open **ZArchiver**, navigate to that folder, and tap on `batch_001_part_001.7z` (the first part of the first batch).
          5. Tap **Extract** – this will produce a set of files named `inner_001.7z`, `inner_002.7z`, … (the 95MB inner volumes).
          6. Now tap on `inner_001.7z`, then tap **Extract** – your original file will appear.

          That's it. No terminal, no commands, no extra apps.
          EOF
          git add README.md
          git commit -m "Add reassembly instructions"
          tag="manifest-${{ github.run_id }}"
          git tag "$tag"
          git push origin "$tag"

      # Step 6: Output the download URLs to the workflow log
      - name: Show download links
        run: |
          echo "══════════════════════════════════════════════════════════════════"
          echo "✅ FILE SUCCESSFULLY SPLIT INTO ${{ env.BATCH_COUNT }} BATCHES"
          echo "══════════════════════════════════════════════════════════════════"
          for i in $(seq 1 ${{ env.BATCH_COUNT }}); do
            echo "Batch $i: https://codeload.github.com/${{ github.repository }}/zip/refs/tags/batch-$(printf "%03d" $i)"
          done
          echo ""
          echo "Manifest (instructions): https://codeload.github.com/${{ github.repository }}/zip/refs/tags/manifest-${{ github.run_id }}"
          echo "══════════════════════════════════════════════════════════════════"
