name: Dynamic Batch Script

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL (GitHub release/tag URL, GitHub asset URL, or any direct link)'
        required: true
      filename:
        description: 'Optional: save as (for direct links only)'
        required: false
      volume_size_mib:
        description: '7z volume size in MiB for repo-safe chunks (keep at 95 or lower)'
        required: false
        default: '95'
      tag_chunk_limit_mib:
        description: 'Max total size per tag in MiB (default: 1900)'
        required: false
        default: '1900'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      WORK_ROOT: generated
      DOWNLOAD_DIR: generated/downloads
      VOLUME_DIR: generated/volumes
      GROUP_DIR: generated/groups
      REPO_PAYLOAD_DIR: repo_payload
      VOLUME_SIZE_MIB: ${{ github.event.inputs.volume_size_mib || '95' }}
      TAG_CHUNK_LIMIT_MIB: ${{ github.event.inputs.tag_chunk_limit_mib || '1900' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean repository files that should not be part of generated tags
        shell: bash
        run: |
          set -euo pipefail
          find "$GITHUB_WORKSPACE" -maxdepth 1 -mindepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            -exec rm -rf {} + 2>/dev/null || true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full curl
          type -p gh >/dev/null || (
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null
            sudo apt-get update
            sudo apt-get install -y gh
          )

      - name: Download input
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail

          URL="${{ github.event.inputs.url }}"
          CUSTOM_NAME="${{ github.event.inputs.filename }}"

          mkdir -p "$DOWNLOAD_DIR" "$VOLUME_DIR" "$GROUP_DIR" "$REPO_PAYLOAD_DIR"

          sanitize() {
            echo "$1" | sed -E 's/[^A-Za-z0-9._-]+/-/g; s/^-+|-+$//g'
          }

          echo "SOURCE_URL=$URL" >> "$GITHUB_ENV"

          case "$URL" in
            *"/releases/tag/"*)
              REPO_PATH=$(echo "$URL" | sed -E 's|https?://github.com/([^/]+/[^/]+)/releases/tag/.*|\1|')
              TAG=$(echo "$URL" | sed -E 's|.*/releases/tag/||' | sed 's|/?$||')
              ARCHIVE_BASE=$(sanitize "${REPO_PATH##*/}-${TAG}")
              SOURCE_KIND="folder"
              gh release download "$TAG" --repo "$REPO_PATH" --clobber --dir "$DOWNLOAD_DIR"
              ;;
            *"/releases/download/"*)
              OUT_NAME=$(basename "${URL%%\?*}")
              if [ -n "$CUSTOM_NAME" ]; then
                OUT_NAME="$CUSTOM_NAME"
              fi
              [ -n "$OUT_NAME" ] || OUT_NAME="github_asset"
              ARCHIVE_BASE=$(sanitize "${OUT_NAME%.*}")
              SOURCE_KIND="single"
              curl -fL --retry 3 --retry-all-errors -o "$DOWNLOAD_DIR/$OUT_NAME" "$URL"
              ;;
            *)
              OUT_NAME=$(basename "${URL%%\?*}")
              if [ -n "$CUSTOM_NAME" ]; then
                OUT_NAME="$CUSTOM_NAME"
              fi
              [ -n "$OUT_NAME" ] || OUT_NAME="downloaded_file"
              ARCHIVE_BASE=$(sanitize "${OUT_NAME%.*}")
              SOURCE_KIND="single"
              curl -fL --retry 3 --retry-all-errors -o "$DOWNLOAD_DIR/$OUT_NAME" "$URL"
              ;;
          esac

          [ -n "$ARCHIVE_BASE" ] || ARCHIVE_BASE="downloaded_file"
          ARCHIVE_BASE=$(sanitize "$ARCHIVE_BASE")
          TAG_BASE=$(sanitize "$ARCHIVE_BASE")

          echo "ARCHIVE_BASE=$ARCHIVE_BASE" >> "$GITHUB_ENV"
          echo "TAG_BASE=$TAG_BASE" >> "$GITHUB_ENV"
          echo "SOURCE_KIND=$SOURCE_KIND" >> "$GITHUB_ENV"

      - name: Build 7z archive and split into repo-safe volumes
        shell: bash
        run: |
          set -euo pipefail

          ARCHIVE_PATH="$VOLUME_DIR/${ARCHIVE_BASE}.7z"

          if [ "$SOURCE_KIND" = "folder" ]; then
            shopt -s dotglob nullglob
            7z a -t7z -mx=0 -mmt=on -v"${VOLUME_SIZE_MIB}m" "$ARCHIVE_PATH" "$DOWNLOAD_DIR"/*
          else
            SOURCE_FILE=$(find "$DOWNLOAD_DIR" -maxdepth 1 -type f | head -n 1)
            if [ -z "$SOURCE_FILE" ]; then
              echo "No downloaded file found."
              exit 1
            fi
            7z a -t7z -mx=0 -mmt=on -v"${VOLUME_SIZE_MIB}m" "$ARCHIVE_PATH" "$SOURCE_FILE"
          fi

          FIRST_VOLUME=$(find "$VOLUME_DIR" -maxdepth 1 -type f -name "${ARCHIVE_BASE}.7z*" | sort -V | head -n 1 | xargs basename)
          if [ -z "$FIRST_VOLUME" ]; then
            echo "Archive creation failed."
            exit 1
          fi
          echo "FIRST_VOLUME=$FIRST_VOLUME" >> "$GITHUB_ENV"

      - name: Group volumes into chunk-sized tags
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os
          from pathlib import Path

          volume_dir = Path(os.environ["VOLUME_DIR"])
          group_dir = Path(os.environ["GROUP_DIR"])
          archive_base = os.environ["ARCHIVE_BASE"]
          limit = int(os.environ["TAG_CHUNK_LIMIT_MIB"]) * 1024 * 1024

          files = sorted(
              [p for p in volume_dir.iterdir() if p.is_file() and p.name.startswith(f"{archive_base}.7z")],
              key=lambda p: p.name
          )

          if not files:
              raise SystemExit("No archive volume files were found.")

          groups = []
          current = []
          current_size = 0

          for path in files:
              size = path.stat().st_size
              if current and current_size + size > limit:
                  groups.append(current)
                  current = []
                  current_size = 0
              current.append(path.name)
              current_size += size

          if current:
              groups.append(current)

          group_dir.mkdir(parents=True, exist_ok=True)
          for idx, group in enumerate(groups, 1):
              with open(group_dir / f"group-{idx:03d}.txt", "w", encoding="utf-8") as fh:
                  fh.write("\n".join(group) + "\n")

          with open(group_dir / "count.txt", "w", encoding="utf-8") as fh:
              fh.write(str(len(groups)))
          PY

      - name: Create one tag per chunk
        shell: bash
        run: |
          set -euo pipefail

          COUNT=$(cat "$GROUP_DIR/count.txt")
          URLS_FILE="$GITHUB_WORKSPACE/generated_urls.txt"
          : > "$URLS_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for GROUP_FILE in "$GROUP_DIR"/group-*.txt; do
            GROUP_NAME=$(basename "$GROUP_FILE" .txt)
            GROUP_INDEX=${GROUP_NAME#group-}
            GROUP_INDEX_DEC=$((10#$GROUP_INDEX))
            TAG_NAME="fetch-${TAG_BASE}-part${GROUP_INDEX}-of${COUNT}-${GITHUB_RUN_ID}"
            TAG_NAME=$(echo "$TAG_NAME" | sed -E 's/[^A-Za-z0-9._-]+/-/g; s/^-+|-+$//g')

            rm -rf "$REPO_PAYLOAD_DIR"
            mkdir -p "$REPO_PAYLOAD_DIR"

            {
              echo "Source URL: $SOURCE_URL"
              echo "Archive base: ${ARCHIVE_BASE}.7z"
              echo "First volume: $FIRST_VOLUME"
              echo "This tag chunk: ${GROUP_INDEX_DEC} of ${COUNT}"
              echo "Tag name: $TAG_NAME"
              echo "Rebuild rule: download every chunk tag into the same folder, then run:"
              echo "  7z x $FIRST_VOLUME"
              echo
              echo "Files in this chunk:"
              while IFS= read -r NAME; do
                [ -n "$NAME" ] && echo "  - $NAME"
              done < "$GROUP_FILE"
            } > "$REPO_PAYLOAD_DIR/README.txt"

            while IFS= read -r NAME; do
              [ -n "$NAME" ] && cp "$VOLUME_DIR/$NAME" "$REPO_PAYLOAD_DIR/"
            done < "$GROUP_FILE"

            git add -A
            if git diff --cached --quiet; then
              echo "No changes for $GROUP_NAME"
              continue
            fi

            git commit -m "Chunk ${GROUP_INDEX_DEC}/${COUNT}: ${ARCHIVE_BASE}"

            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"

            echo "https://codeload.github.com/${{ github.repository }}/zip/refs/tags/$TAG_NAME" >> "$URLS_FILE"
          done

      - name: Show final codeload URLs
        shell: bash
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║                         ✅ SUCCESS                               ║"
          echo "╠══════════════════════════════════════════════════════════════════╣"
          echo "║  DOWNLOAD EVERY TAG LISTED BELOW, UNZIP THEM INTO ONE FOLDER,   ║"
          echo "║  THEN EXTRACT THE FIRST VOLUME WITH 7-ZIP.                       ║"
          echo "╚══════════════════════════════════════════════════════════════════╝"
          echo ""
          cat "$GITHUB_WORKSPACE/generated_urls.txt" || true
          echo ""
