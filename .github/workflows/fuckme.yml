name: Stable Split + Multi-Tag (No Corruption)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct download URL'
        required: true
      filename:
        description: 'Optional custom filename'
        required: false

jobs:
  split:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean workspace
        run: |
          find . -maxdepth 1 -type f -delete
          find . -maxdepth 1 -type d -not -name '.git' -not -name '.github' -not -name '.' -exec rm -rf {} + 2>/dev/null || true
          git checkout HEAD -- .github/workflows/*.yml 2>/dev/null || true

      - name: Install 7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      # ---------------- DOWNLOAD ----------------
      - name: Download file
        run: |
          URL="${{ github.event.inputs.url }}"
          CUSTOM="${{ github.event.inputs.filename }}"

          if [ -n "$CUSTOM" ]; then
            OUT="$CUSTOM"
          else
            OUT=$(basename "$URL" | sed 's/\?.*//')
            [ -z "$OUT" ] && OUT="file"
          fi

          echo "Downloading..."
          curl -L --fail --retry 3 -o "$OUT" "$URL"

          echo "FILE=$OUT" >> $GITHUB_ENV

      # ---------------- SPLIT (ONLY ONCE) ----------------
      - name: Split into 95MB volumes (SAFE)
        run: |
          echo "Splitting into 95MB parts..."
          7z a -v95m -mx0 archive.7z "$FILE"
          rm -f "$FILE"

          echo "Parts created:"
          ls -lh archive.7z.*

      # ---------------- DELETE OLD TAGS ----------------
      - name: Delete old tags
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git fetch --tags
          for tag in $(git tag | grep '^batch-'); do
            git tag -d "$tag" || true
            git push origin --delete "$tag" || true
          done

      # ---------------- PUSH PARTS IN GROUPS ----------------
      - name: Push parts as multiple tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          parts=(archive.7z.*)

          GROUP_SIZE=20   # ~1.9GB total per tag (SAFE)

          total=${#parts[@]}
          index=0
          tag_num=1

          while [ $index -lt $total ]; do
            tag=$(printf "batch-%03d" $tag_num)

            echo "Creating $tag..."

            git checkout --orphan temp-$tag
            git rm -rf . 2>/dev/null || true

            group=("${parts[@]:$index:$GROUP_SIZE}")

            git add "${group[@]}"
            git commit -m "Batch $tag_num"

            git tag "$tag"
            git push origin "$tag" --force

            git checkout main
            git branch -D temp-$tag || true

            index=$((index + GROUP_SIZE))
            tag_num=$((tag_num + 1))
          done

          echo "TOTAL_TAGS=$((tag_num-1))" >> $GITHUB_ENV

      # ---------------- MANIFEST ----------------
      - name: Create manifest
        run: |
          echo "# Download all parts" > README.md
          echo "" >> README.md

          for i in $(seq 1 ${{ env.TOTAL_TAGS }}); do
            printf "- https://codeload.github.com/${{ github.repository }}/zip/refs/tags/batch-%03d\n" $i >> README.md
          done

          echo "" >> README.md
          echo "## How to extract" >> README.md
          echo "1. Download ALL zips" >> README.md
          echo "2. Extract them" >> README.md
          echo "3. Put all archive.7z.xxx in one folder" >> README.md
          echo "4. Extract archive.7z.001" >> README.md

          git add README.md
          git commit -m "Manifest"

          tag="manifest-${{ github.run_id }}"
          git tag "$tag"
          git push origin "$tag"

      # ---------------- OUTPUT ----------------
      - name: Show links
        run: |
          echo "=============================="
          echo "DOWNLOAD ALL THESE:"
          echo "=============================="

          for i in $(seq 1 ${{ env.TOTAL_TAGS }}); do
            printf "https://codeload.github.com/${{ github.repository }}/zip/refs/tags/batch-%03d\n" $i
          done

          echo ""
          echo "Manifest:"
          echo "https://codeload.github.com/${{ github.repository }}/zip/refs/tags/manifest-${{ github.run_id }}"
