name: Repack Release as ZIP

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'Direct URL to the file you want to repack (e.g. APK, EXE, etc.)'
        required: true
      file_name:
        description: 'Output filename (without extension, e.g. "myapp-v1.0")'
        required: true
        default: 'release'
      tag:
        description: 'Tag name for the release (e.g. v1.0)'
        required: true
        default: 'v1.0'

jobs:
  repack:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download the file
        run: |
          curl -L "${{ github.event.inputs.download_url }}" \
            -o "${{ github.event.inputs.file_name }}.original"

      - name: Detect file extension
        id: detect
        run: |
          URL="${{ github.event.inputs.download_url }}"
          EXT="${URL##*.}"
          # Strip query strings if any
          EXT="${EXT%%\?*}"
          echo "ext=$EXT" >> $GITHUB_OUTPUT

      - name: Rename with original extension
        run: |
          mv "${{ github.event.inputs.file_name }}.original" \
             "${{ github.event.inputs.file_name }}.${{ steps.detect.outputs.ext }}"

      - name: Pack into ZIP
        run: |
          zip "${{ github.event.inputs.file_name }}.zip" \
              "${{ github.event.inputs.file_name }}.${{ steps.detect.outputs.ext }}"

      - name: Create release and upload ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: "Repacked - ${{ github.event.inputs.file_name }}"
          body: |
            Repacked from: ${{ github.event.inputs.download_url }}
          files: "${{ github.event.inputs.file_name }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
