name: Create Download Link File

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo (owner/repo)'
        required: true
      release_tag:
        description: 'Tag of target release'
        required: true
      file_pattern:
        description: 'File pattern (e.g., *.apk)'
        required: true

jobs:
  create-link:
    runs-on: ubuntu-latest
    steps:
      - name: Download target file
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.event.inputs.target_repo }}
          tag: ${{ github.event.inputs.release_tag }}
          fileName: ${{ github.event.inputs.file_pattern }}
          out-file-path: "downloaded"

      - name: Create tag with file
        id: create_tag
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          FILE=$(ls downloaded/* | head -1)
          base64 -w 0 "$FILE" > payload.b64
          
          # Get default branch SHA
          DEFAULT_BRANCH=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO" | jq -r '.default_branch')
          BASE_SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/git/refs/heads/$DEFAULT_BRANCH" | jq -r '.object.sha')
          
          # Create blob
          CONTENT=$(base64 -w 0 payload.b64)
          BLOB_SHA=$(curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"$CONTENT\",\"encoding\":\"base64\"}" \
            "https://api.github.com/repos/$REPO/git/blobs" | jq -r '.sha')
          
          # Create tree
          TREE_SHA=$(curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"base_tree\":\"$BASE_SHA\",\"tree\":[{\"path\":\"payload.b64\",\"mode\":\"100644\",\"type\":\"blob\",\"sha\":\"$BLOB_SHA\"}]}" \
            "https://api.github.com/repos/$REPO/git/trees" | jq -r '.sha')
          
          # Create commit
          COMMIT_SHA=$(curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"message\":\"Add payload file\",\"tree\":\"$TREE_SHA\",\"parents\":[\"$BASE_SHA\"]}" \
            "https://api.github.com/repos/$REPO/git/commits" | jq -r '.sha')
          
          # Create tag
          TAG_NAME="get-${{ github.run_id }}"
          curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"refs/tags/$TAG_NAME\",\"sha\":\"$COMMIT_SHA\"}" \
            "https://api.github.com/repos/$REPO/git/refs"
          
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create DOWNLOAD.txt with the link
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.create_tag.outputs.TAG_NAME }}
        run: |
          DOWNLOAD_URL="https://codeload.github.com/$REPO/zip/refs/tags/$TAG"
          
          # Create file content
          echo "Download your file from this URL:" > DOWNLOAD.txt
          echo "$DOWNLOAD_URL" >> DOWNLOAD.txt
          echo "" >> DOWNLOAD.txt
          echo "After downloading, extract the zip and run:" >> DOWNLOAD.txt
          echo "base64 -d payload.b64 > output.apk" >> DOWNLOAD.txt
          
          # Encode to base64
          CONTENT=$(base64 -w 0 DOWNLOAD.txt)
          
          # Get default branch
          BRANCH=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO" | jq -r '.default_branch')
          
          # Check if DOWNLOAD.txt already exists to get SHA
          EXISTING=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/contents/DOWNLOAD.txt" 2>/dev/null)
          
          if echo "$EXISTING" | grep -q "sha"; then
            SHA=$(echo "$EXISTING" | jq -r '.sha')
            curl -X PUT -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"message\":\"Update download link\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\",\"branch\":\"$BRANCH\"}" \
              "https://api.github.com/repos/$REPO/contents/DOWNLOAD.txt"
          else
            curl -X PUT -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"message\":\"Create download link file\",\"content\":\"$CONTENT\",\"branch\":\"$BRANCH\"}" \
              "https://api.github.com/repos/$REPO/contents/DOWNLOAD.txt"
          fi
