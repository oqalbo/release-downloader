name: Get File Direct

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo (owner/repo)'
        required: true
      release_tag:
        description: 'Release tag'
        required: true
      file_pattern:
        description: 'File pattern (e.g., *.apk)'
        required: true

jobs:
  get:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download target file
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.event.inputs.target_repo }}
          tag: ${{ github.event.inputs.release_tag }}
          fileName: ${{ github.event.inputs.file_pattern }}
          out-file-path: "downloaded"
      
      - name: Copy APK directly (no base64)
        run: |
          FILE=$(ls downloaded/* | head -1)
          FILENAME=$(basename "$FILE")
          cp "$FILE" "$FILENAME"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILENAME"
          git commit -m "Add $FILENAME"
          git push origin main
      
      - name: Create tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: get-${{ github.run_id }}
          files: |
            *.apk
            *.zip
            *.exe
