name: Download and Repackage as Allowed Format

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repository (owner/repo)'
        required: true
      release_tag:
        description: 'Release tag from target (e.g., v1.13.11)'
        required: true
      file_pattern:
        description: 'File to download (e.g., *.apk)'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push to repo
    steps:
      - name: Download asset from target release
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.event.inputs.target_repo }}
          tag: ${{ github.event.inputs.release_tag }}
          fileName: ${{ github.event.inputs.file_pattern }}
          out-file-path: "downloaded"

      - name: Package as source.zip
        run: |
          mkdir package_contents
          cp downloaded/* package_contents/
          cd package_contents
          zip -r ../source.zip .

      - name: Create GitHub Release with the zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "pass-${{ github.run_id }}"
          name: "Download ${{ github.event.inputs.release_tag }}"
          files: source.zip
