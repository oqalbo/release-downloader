name: Create Working Tag

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo (owner/repo)'
        required: true
      release_tag:
        description: 'Tag of target release'
        required: true
      file_pattern:
        description: 'File pattern (e.g., *.apk)'
        required: true

jobs:
  create-working-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Download target file
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.event.inputs.target_repo }}
          tag: ${{ github.event.inputs.release_tag }}
          fileName: ${{ github.event.inputs.file_pattern }}
          out-file-path: "downloaded"

      - name: Convert and prepare
        run: |
          FILE=$(ls downloaded/* | head -1)
          base64 -w 0 "$FILE" > payload.b64
          
          # Create index.html to view the link
          echo "<html><body><h1>Download URL:</h1><p><a href='https://codeload.github.com/${{ github.repository }}/zip/refs/heads/download-tag'>codeload link</a></p></body></html>" > index.html

      - name: Commit and tag using API
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          BRANCH=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO" | jq -r '.default_branch')
          
          # Get current commit SHA of default branch
          COMMIT_SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/git/refs/heads/$BRANCH" | jq -r '.object.sha')
          
          # Create blobs for both files
          CONTENT1=$(base64 -w 0 payload.b64)
          BLOB1=$(curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"$CONTENT1\",\"encoding\":\"base64\"}" \
            "https://api.github.com/repos/$REPO/git/blobs" | jq -r '.sha')
          
          CONTENT2=$(base64 -w 0 index.html)
          BLOB2=$(curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"$CONTENT2\",\"encoding\":\"base64\"}" \
            "https://api.github.com/repos/$REPO/git/blobs" | jq -r '.sha')
          
          # Create new tree with both files
          TREE=$(curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"base_tree\":\"$COMMIT_SHA\",\"tree\":[{\"path\":\"payload.b64\",\"mode\":\"100644\",\"type\":\"blob\",\"sha\":\"$BLOB1\"},{\"path\":\"index.html\",\"mode\":\"100644\",\"type\":\"blob\",\"sha\":\"$BLOB2\"}]}" \
            "https://api.github.com/repos/$REPO/git/trees" | jq -r '.sha')
          
          # Create new commit
          NEW_COMMIT=$(curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"message\":\"Add payload and index\",\"tree\":\"$TREE\",\"parents\":[\"$COMMIT_SHA\"]}" \
            "https://api.github.com/repos/$REPO/git/commits" | jq -r '.sha')
          
          # Update the branch to point to new commit
          curl -X PATCH -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"sha\":\"$NEW_COMMIT\"}" \
            "https://api.github.com/repos/$REPO/git/refs/heads/$BRANCH"
          
          # Create a tag pointing to this commit
          TAG_NAME="download-tag"
          curl -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"refs/tags/$TAG_NAME\",\"sha\":\"$NEW_COMMIT\"}" \
            "https://api.github.com/repos/$REPO/git/refs"
