name: Commit and Tag

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo (owner/repo)'
        required: true
      release_tag:
        description: 'Release tag of target'
        required: true
      file_pattern:
        description: 'File pattern (e.g., *.apk)'
        required: true

jobs:
  commit-and-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Download target file
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.event.inputs.target_repo }}
          tag: ${{ github.event.inputs.release_tag }}
          fileName: ${{ github.event.inputs.file_pattern }}
          out-file-path: "downloaded"

      - name: Convert to base64
        run: |
          FILE=$(ls downloaded/* | head -1)
          base64 -w 0 "$FILE" > payload.b64

      - name: Commit the file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add payload.b64
          git commit -m "Add payload.b64"
          git push origin main

      - name: Create tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dl-${{ github.run_id }}
          generate_release_notes: true
