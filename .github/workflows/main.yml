name: Download and Inject into Tag Archive

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repository (owner/repo)'
        required: true
      release_tag:
        description: 'Release tag from target'
        required: true
      file_pattern:
        description: 'File to download (e.g., *.apk)'
        required: true

jobs:
  inject:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download target asset
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.event.inputs.target_repo }}
          tag: ${{ github.event.inputs.release_tag }}
          fileName: ${{ github.event.inputs.file_pattern }}
          out-file-path: "downloaded"

      - name: Create git repo with the file as source
        run: |
          # Create directory with the file
          mkdir -p fake_source
          cp downloaded/* fake_source/
          
          # Initialize git and set identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git init
          cp -r fake_source/* .
          git add .
          git commit -m "Add downloaded file"
          
          # Create tag
          git tag "pass-${{ github.run_id }}"

      - name: Push tag to your repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push origin "pass-${{ github.run_id }}" --force
