name: Fetch Direct APK

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target Repository (owner/repo)'
        required: true
      release_tag:
        description: 'Release Tag'
        required: true
      file_pattern:
        description: 'File Pattern (e.g., *.apk)'
        required: true

jobs:
  fetch-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Remove all old files except workflow
        run: |
          # Delete everything except .git and .github
          find . -maxdepth 1 -type f -delete
          find . -maxdepth 1 -type d -not -name '.git' -not -name '.github' -not -name '.' -exec rm -rf {} + 2>/dev/null || true
          # Restore workflow file
          git checkout HEAD -- .github/workflows/main.yml 2>/dev/null || true
      
      - name: Download and move APK directly
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.event.inputs.target_repo }}
          tag: ${{ github.event.inputs.release_tag }}
          fileName: ${{ github.event.inputs.file_pattern }}
          out-file-path: "."
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add downloaded file"
          git push origin main --force
      
      - name: Create tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: get-${{ github.run_id }}
          files: |
            *.apk
            *.zip
            *.exe
      
      - name: Show download URL
        run: |
          echo ""
          echo "DOWNLOAD URL:"
          echo "https://codeload.github.com/${{ github.repository }}/zip/refs/tags/get-${{ github.run_id }}"
          echo ""
