name: Just Split - No Push

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo'
        required: true
      release_tag:
        description: 'Release tag'
        required: true
      file_pattern:
        description: 'File pattern'
        required: true

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - name: Download file
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.event.inputs.target_repo }}
          tag: ${{ github.event.inputs.release_tag }}
          fileName: ${{ github.event.inputs.file_pattern }}
          out-file-path: "downloaded"

      - name: Convert to base64 and display
        run: |
          FILE=$(ls downloaded/* | head -1)
          base64 -w 0 "$FILE" > encoded.txt
          echo "=== MANIFEST ==="
          echo "Base64 encoded file ready"
          echo "Size: $(wc -c < encoded.txt) bytes"
          echo ""
          echo "=== FIRST 1000 CHARACTERS ==="
          head -c 1000 encoded.txt
