name: Download and Push to Branch

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repository (owner/repo)'
        required: true
      release_tag:
        description: 'Release tag from target'
        required: true
      file_pattern:
        description: 'File to download (e.g., *.apk)'
        required: true

jobs:
  inject:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download target asset
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.event.inputs.target_repo }}
          tag: ${{ github.event.inputs.release_tag }}
          fileName: ${{ github.event.inputs.file_pattern }}
          out-file-path: "downloaded"

      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create branch with the file
        run: |
          BRANCH_NAME="downloaded-${{ github.run_id }}"
          git checkout --orphan $BRANCH_NAME
          git rm -rf .
          cp -r downloaded/* .
          git add .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Add downloaded file"
          git push origin $BRANCH_NAME --force
