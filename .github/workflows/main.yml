name: Fetch Direct APK

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target Repository (owner/repo)'
        required: true
      release_tag:
        description: 'Release Tag'
        required: true
      file_pattern:
        description: 'File Pattern (e.g., *.apk)'
        required: true

jobs:
  fetch-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Remove all old files except workflow
        run: |
          # Keep only .git and .github/workflows
          find . -maxdepth 1 -type f -delete
          find . -maxdepth 1 -type d -not -name '.git' -not -name '.github' -not -name '.' -exec rm -rf {} + 2>/dev/null || true
          rm -rf .github/workflows/* 2>/dev/null || true
          # Restore just the workflow file from git
          git checkout HEAD -- .github/workflows/main.yml 2>/dev/null || true
          echo "Cleanup complete"
      
      - name: Download target file
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.event.inputs.target_repo }}
          tag: ${{ github.event.inputs.release_tag }}
          fileName: ${{ github.event.inputs.file_pattern }}
          out-file-path: "downloaded"
      
      - name: Copy APK to repository root
        run: |
          FILE=$(ls downloaded/* | head -1)
          ORIGINAL_NAME=$(basename "$FILE")
          cp "$FILE" "./$ORIGINAL_NAME"
          echo "FILE_NAME=$ORIGINAL_NAME" >> $GITHUB_ENV
          echo "Copied: $ORIGINAL_NAME"
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add ${{ env.FILE_NAME }}"
          git push origin main --force
      
      - name: Create tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: get-${{ github.run_id }}
          files: ${{ env.FILE_NAME }}
      
      - name: Show download URL
        run: |
          echo ""
          echo "DOWNLOAD URL:"
          echo "https://codeload.github.com/${{ github.repository }}/zip/refs/tags/get-${{ github.run_id }}"
          echo ""
