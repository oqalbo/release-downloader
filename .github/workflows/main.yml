name: Create Working Tag with File

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo (owner/repo)'
        required: true
      release_tag:
        description: 'Release tag of target'
        required: true
      file_pattern:
        description: 'File pattern (e.g., *.apk)'
        required: true

jobs:
  working-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Download target file
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.event.inputs.target_repo }}
          tag: ${{ github.event.inputs.release_tag }}
          fileName: ${{ github.event.inputs.file_pattern }}
          out-file-path: "downloaded"

      - name: Convert to base64
        run: |
          FILE=$(ls downloaded/* | head -1)
          base64 -w 0 "$FILE" > payload.b64
          
          # Also create a helper HTML file
          echo "<html><body><h1>Download ready</h1><p>Use: base64 -d payload.b64 > output.apk</p></body></html>" > index.html

      - name: Create Release and Tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dl-${{ github.run_id }}
          name: Download ${{ github.event.inputs.release_tag }}
          files: |
            payload.b64
            index.html
          generate_release_notes: false
