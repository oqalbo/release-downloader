name: Split APK into Text Pieces

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo (owner/repo)'
        required: true
      release_tag:
        description: 'Release tag'
        required: true
      file_pattern:
        description: 'File pattern (e.g., *.apk)'
        required: true

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - name: Download file
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.event.inputs.target_repo }}
          tag: ${{ github.event.inputs.release_tag }}
          fileName: ${{ github.event.inputs.file_pattern }}
          out-file-path: "downloaded"

      - name: Split into text pieces
        run: |
          FILE=$(ls downloaded/* | head -1)
          echo "FILE_PATH=$FILE" >> $GITHUB_ENV
          
          # Convert to base64 and split into 50KB text files
          base64 -w 0 "$FILE" > encoded.txt
          split -b 50000 encoded.txt piece_
          
          # Add line numbers to each piece (looks more like source code)
          for f in piece_*; do
            nl "$f" > "${f}.txt"
            rm "$f"
          done

      - name: Upload pieces as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: file-pieces
          path: piece_*.txt
