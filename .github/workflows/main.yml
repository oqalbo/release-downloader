name: GitHub Release Fetcher

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target Repository (owner/repo)'
        required: true
      release_tag:
        description: 'Release Tag'
        required: true
      file_pattern:
        description: 'File Pattern (*.apk, *.zip, *.exe, etc.)'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Clean old files
        run: |
          # Delete everything except .git and .github
          find . -maxdepth 1 -type f -delete
          find . -maxdepth 1 -type d -not -name '.git' -not -name '.github' -not -name '.' -exec rm -rf {} + 2>/dev/null || true
          # Restore workflow file
          git checkout HEAD -- .github/workflows/fetcher.yml 2>/dev/null || true
      
      - name: Download file
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.event.inputs.target_repo }}
          tag: ${{ github.event.inputs.release_tag }}
          fileName: ${{ github.event.inputs.file_pattern }}
          out-file-path: "."
      
      - name: Delete ALL previous tags
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Get all tags
          git fetch --tags
          TAGS=$(git tag)
          
          for tag in $TAGS; do
            echo "Deleting tag: $tag"
            git tag -d "$tag"
            git push origin --delete "$tag" 2>/dev/null || true
            # Also delete via API as backup
            curl -X DELETE \
              -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$tag" 2>/dev/null || true
          done
          
          echo "All tags deleted"
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fetch: ${{ github.event.inputs.file_pattern }} from ${{ github.event.inputs.target_repo }}:${{ github.event.inputs.release_tag }}"
          git push origin main --force
      
      - name: Create new tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.run_id }}
          files: |
            *
            !.git
            !.github
      
      - name: Show download URL
        run: |
          echo ""
          echo "========================================="
          echo "  DOWNLOAD URL:"
          echo "  https://codeload.github.com/${{ github.repository }}/zip/refs/tags/${{ github.run_id }}"
          echo "========================================="
          echo ""
