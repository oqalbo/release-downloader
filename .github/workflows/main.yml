name: 🚀 Fetch & Package Release File

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: '📦 Target Repository (格式: owner/repo)'
        required: true
        default: 'SagerNet/sing-box'
      release_tag:
        description: '🏷️ Release Tag (例: v1.13.11)'
        required: true
      file_pattern:
        description: '📁 File Pattern (例: *.apk 或 完整文件名)'
        required: true
        default: '*.apk'

jobs:
  fetch-and-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🧹 Clean up all old files (except .git)
        run: |
          echo "🧹 Removing all old files from repository..."
          find . -not -path "./.git/*" -not -path "./.git" -not -name "." -not -name ".." -delete
          echo "✅ Cleanup complete - repository is now empty"
      
      - name: ⬇️ Download target release file
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.event.inputs.target_repo }}
          tag: ${{ github.event.inputs.release_tag }}
          fileName: ${{ github.event.inputs.file_pattern }}
          out-file-path: "downloaded"
      
      - name: 🔐 Convert to base64 (bypass filter)
        run: |
          echo "📥 Processing downloaded file..."
          FILE=$(ls downloaded/* | head -1)
          ORIGINAL_NAME=$(basename "$FILE")
          echo "📄 Original file: $ORIGINAL_NAME"
          echo "📏 Original size: $(du -h "$FILE" | cut -f1)"
          
          # Convert to base64
          base64 -w 0 "$FILE" > final.apk.b64
          echo "✅ Converted to base64"
          echo "📏 Base64 size: $(du -h final.apk.b64 | cut -f1)"
          
          # Save original filename for reference
          echo "$ORIGINAL_NAME" > original_filename.txt
      
      - name: 📝 Create download instructions
        run: |
          cat > HOW_TO_DECODE.txt << 'EOF'
          ==========================================
          HOW TO DECODE THIS FILE
          ==========================================
          
          1. Download the source zip from:
             https://codeload.github.com/YOUR_REPO/zip/refs/tags/GET-TAG-NAME
          
          2. Extract the zip - you will find 'final.apk.b64'
          
          3. Decode it:
             
             Linux/Mac/Git Bash:
             base64 -d final.apk.b64 > output.apk
             
             Windows PowerShell:
             [IO.File]::WriteAllBytes("output.apk", [Convert]::FromBase64String((Get-Content final.apk.b64 -Raw)))
             
             Android (Termux):
             base64 -d final.apk.b64 > output.apk
          
          4. The decoded file will be the original APK/binary
          
          Original filename was saved in: original_filename.txt
          EOF
          
          echo "✅ Created decoding instructions"
      
      - name: 🎨 Create fancy index page
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Download Ready</title>
              <style>
                  body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
                  .success { color: green; }
                  .code { background: #f4f4f4; padding: 10px; border-left: 3px solid #4CAF50; font-family: monospace; }
                  h1 { color: #333; }
              </style>
          </head>
          <body>
              <h1>✅ Download Package Ready</h1>
              <p class="success">The file has been successfully downloaded and converted.</p>
              <h2>📦 How to get your file:</h2>
              <p>1. Download the source zip from the Tags section</p>
              <p>2. Extract <code>final.apk.b64</code></p>
              <p>3. Decode using base64:</p>
              <div class="code">base64 -d final.apk.b64 > output.apk</div>
              <hr>
              <p><small>Generated by GitHub Actions</small></p>
          </body>
          </html>
          EOF
          echo "✅ Created fancy index page"
      
      - name: 📤 Commit all files to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all new files
          git add -A
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "⚠️ No changes to commit"
          else
            git commit -m "🎉 Fetch: ${{ github.event.inputs.file_pattern }} from ${{ github.event.inputs.target_repo }} (${{ github.event.inputs.release_tag }})"
            git push origin main --force
            echo "✅ Changes pushed to repository"
          fi
      
      - name: 🏷️ Create release tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: get-${{ github.run_id }}
          name: "📦 ${{ github.event.inputs.file_pattern }} from ${{ github.event.inputs.release_tag }}"
          body: |
            ## ✅ Successfully fetched
            
            - **Source:** ${{ github.event.inputs.target_repo }}
            - **Tag:** ${{ github.event.inputs.release_tag }}
            - **File:** ${{ github.event.inputs.file_pattern }}
            - **Run ID:** ${{ github.run_id }}
            
            ### 📥 Download
            
            Download the source zip from:
            ```
            https://codeload.github.com/${{ github.repository }}/zip/refs/tags/get-${{ github.run_id }}
            ```
            
            ### 🔓 Decode Instructions
            
            Extract the zip and run:
            ```bash
            base64 -d final.apk.b64 > output.apk
            ```
            
            The original filename was saved in `original_filename.txt`
          generate_release_notes: false
      
      - name: 🎯 Output download URL
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                    ✅ SUCCESS!                             ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          echo "║  DOWNLOAD URL:                                             ║"
          echo "║  https://codeload.github.com/${{ github.repository }}/zip/refs/tags/get-${{ github.run_id }}"
          echo "║                                                            ║"
          echo "║  DECODE COMMAND:                                           ║"
          echo "║  base64 -d final.apk.b64 > output.apk                     ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
