name: GitHub Release Fetcher (Large Files - Safe Splitting)

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target Repository (owner/repo)'
        required: true
      release_tag:
        description: 'Release Tag'
        required: true
      file_pattern:
        description: 'File Pattern (*.apk, *.zip, *.exe, etc.)'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Clean old files
        run: |
          find . -maxdepth 1 -type f -delete
          find . -maxdepth 1 -type d -not -name '.git' -not -name '.github' -not -name '.' -exec rm -rf {} + 2>/dev/null || true
          git checkout HEAD -- .github/workflows/fetcher.yml 2>/dev/null || true
      
      - name: Download file
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.event.inputs.target_repo }}
          tag: ${{ github.event.inputs.release_tag }}
          fileName: ${{ github.event.inputs.file_pattern }}
          out-file-path: "downloaded"
      
      - name: Split into SAFE chunks (max 95MB to be safe)
        run: |
          FILE=$(ls downloaded/* | head -1)
          ORIGINAL_NAME=$(basename "$FILE")
          echo "ORIGINAL_NAME=$ORIGINAL_NAME" >> $GITHUB_ENV
          
          # Get original size
          SIZE=$(stat -c%s "$FILE")
          echo "Original size: $SIZE bytes"
          
          # Split into 95MB chunks (95 * 1024 * 1024 = 99614720 bytes)
          # This is safely under GitHub's 100MB limit
          split -b 99614720 "$FILE" chunk_
          
          # Count chunks
          CHUNK_COUNT=$(ls chunk_* | wc -l)
          echo "CHUNK_COUNT=$CHUNK_COUNT" >> $GITHUB_ENV
          
          # Delete the original large file so it's never committed
          rm -f "$FILE"
          rm -rf downloaded
          
          # Create reassemble script
          cat > REASSEMBLE.sh << 'EOF'
          #!/bin/bash
          echo "Reassembling $CHUNK_COUNT chunks..."
          cat chunk_* > "$ORIGINAL_NAME"
          echo "Done! File restored as: $ORIGINAL_NAME"
          echo "Size: $(stat -c%s "$ORIGINAL_NAME" 2>/dev/null || stat -f%z "$ORIGINAL_NAME" 2>/dev/null) bytes"
          EOF
          
          # Replace variables in script
          sed -i "s/\$CHUNK_COUNT/$CHUNK_COUNT/g" REASSEMBLE.sh
          sed -i "s/\$ORIGINAL_NAME/$ORIGINAL_NAME/g" REASSEMBLE.sh
          chmod +x REASSEMBLE.sh
          
          # Create instruction file
          cat > README.txt << EOF
          ========================================
          LARGE FILE DOWNLOAD - NEEDS REASSEMBLY
          ========================================
          
          Original file: $ORIGINAL_NAME
          Total chunks: $CHUNK_COUNT
          Each chunk: 95MB max
          
          TO REASSEMBLE:
          
          Linux/Mac/Git Bash:
          ./REASSEMBLE.sh
          
          Windows:
          copy /b chunk_* $ORIGINAL_NAME
          
          Then use the file normally.
          ========================================
          EOF
          
          echo "Split into $CHUNK_COUNT chunks (95MB each)"
      
      - name: Delete ALL previous tags
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git fetch --tags
          for tag in $(git tag); do
            echo "Deleting tag: $tag"
            git tag -d "$tag"
            git push origin --delete "$tag" 2>/dev/null || true
            curl -X DELETE -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$tag" 2>/dev/null || true
          done
      
      - name: Commit and push chunks (NO large files)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fetch: ${{ github.event.inputs.file_pattern }} (split into ${{ env.CHUNK_COUNT }} chunks of 95MB)"
          git push origin main --force
      
      - name: Create tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.run_id }}
          files: |
            chunk_*
            REASSEMBLE.sh
            README.txt
            !.git
            !.github
      
      - name: Show download URL and instructions
        run: |
          echo ""
          echo "========================================="
          echo "  DOWNLOAD URL:"
          echo "  https://codeload.github.com/${{ github.repository }}/zip/refs/tags/${{ github.run_id }}"
          echo ""
          echo "  FILE: ${{ env.ORIGINAL_NAME }} (RESTORED AFTER REASSEMBLY)"
          echo "  CHUNKS: ${{ env.CHUNK_COUNT }} (95MB each)"
          echo ""
          echo "  TO REASSEMBLE AFTER DOWNLOAD:"
          echo "    Linux/Mac: ./REASSEMBLE.sh"
          echo "    Windows:   copy /b chunk_* ${{ env.ORIGINAL_NAME }}"
          echo "========================================="
