name: GitHub Release Fetcher (7z Multi-Volume)

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target Repository (owner/repo)'
        required: true
      release_tag:
        description: 'Release Tag'
        required: true
      file_pattern:
        description: 'File Pattern'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Clean old files
        run: |
          find . -maxdepth 1 -type f -delete
          find . -maxdepth 1 -type d -not -name '.git' -not -name '.github' -not -name '.' -exec rm -rf {} + 2>/dev/null || true
          git checkout HEAD -- .github/workflows/fetcher.yml 2>/dev/null || true
      
      - name: Install p7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full
      
      - name: Download file
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.event.inputs.target_repo }}
          tag: ${{ github.event.inputs.release_tag }}
          fileName: ${{ github.event.inputs.file_pattern }}
          out-file-path: "downloaded"
      
      - name: Create 7z multi-volume archive (95MB per volume)
        run: |
          FILE=$(ls downloaded/* | head -1)
          ORIGINAL_NAME=$(basename "$FILE")
          echo "ORIGINAL_NAME=$ORIGINAL_NAME" >> $GITHUB_ENV
          
          # Create multi-volume 7z archive (95MB per volume)
          7z a -v95m -mx9 archive.7z "$FILE"
          
          # Delete original large file
          rm -f "$FILE"
          rm -rf downloaded
          
          # Create instruction file
          cat > README.txt << EOF
          ========================================
          7-ZIP MULTI-VOLUME ARCHIVE
          ========================================
          
          Original file: $ORIGINAL_NAME
          
          TO EXTRACT ON ANDROID:
          
          1. Download ALL volumes (archive.7z.001, archive.7z.002, etc.)
          2. Open ZArchiver or RAR
          3. Tap on archive.7z.001
          4. Extract the file
          
          All volumes are in the same folder.
          ========================================
          EOF
          
          echo "Created multi-volume archive"
          ls -lh archive.7z.*
      
      - name: Delete ALL previous tags
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git fetch --tags
          for tag in $(git tag); do
            git tag -d "$tag"
            git push origin --delete "$tag" 2>/dev/null || true
            curl -X DELETE -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$tag" 2>/dev/null || true
          done
      
      - name: Commit and push volumes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fetch: ${{ github.event.inputs.file_pattern }} (7z volumes)"
          git push origin main --force
      
      - name: Create tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.run_id }}
          files: |
            archive.7z.*
            README.txt
      
      - name: Show download URL
        run: |
          echo ""
          echo "DOWNLOAD URL:"
          echo "https://codeload.github.com/${{ github.repository }}/zip/refs/tags/${{ github.run_id }}"
          echo ""
          echo "On Android: Download all volumes, open archive.7z.001 in ZArchiver"
