name: GitHub Release Fetcher (7z Multi-Volume)

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target Repository (owner/repo)'
        required: true
      release_tag:
        description: 'Release Tag'
        required: true
      file_pattern:
        description: 'File Pattern'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Clean old files
        run: |
          find . -maxdepth 1 -type f -delete
          find . -maxdepth 1 -type d -not -name '.git' -not -name '.github' -not -name '.' -exec rm -rf {} + 2>/dev/null || true
          git checkout HEAD -- .github/workflows/fetcher.yml 2>/dev/null || true
      
      - name: Install p7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full
      
      - name: Download file
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.event.inputs.target_repo }}
          tag: ${{ github.event.inputs.release_tag }}
          fileName: ${{ github.event.inputs.file_pattern }}
          out-file-path: "downloaded"
      
      - name: Create 7z multi-volume archive
        run: |
          FILE=$(ls downloaded/* | head -1)
          ORIGINAL_NAME=$(basename "$FILE")
          echo "ORIGINAL_NAME=$ORIGINAL_NAME" >> $GITHUB_ENV
          
          7z a -v95m -mx9 archive.7z "$FILE"
          
          rm -f "$FILE"
          rm -rf downloaded
          
          cat > README.txt << EOF
          Multi-volume 7z archive
          Original file: $ORIGINAL_NAME
          
          Extract on Android with ZArchiver:
          - Download all volumes
          - Tap on archive.7z.001
          - Extract
          EOF
      
      - name: Delete ALL previous tags (safe version)
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Fetch all tags
          git fetch --tags
          
          # Get list of tags
          TAGS=$(git tag)
          
          if [ -z "$TAGS" ]; then
            echo "No tags to delete"
            exit 0
          fi
          
          for tag in $TAGS; do
            echo "Processing tag: $tag"
            
            # Delete local tag
            git tag -d "$tag" 2>/dev/null || true
            
            # Delete remote tag via git (ignore errors if tag doesn't exist remotely)
            git push origin --delete "$tag" 2>/dev/null || true
            
            # Delete via API (if PAT is available)
            if [ -n "$GH_TOKEN" ]; then
              curl -X DELETE \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$tag" \
                2>/dev/null || true
            fi
          done
          
          echo "All tags processed"
      
      - name: Commit and push volumes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fetch: ${{ github.event.inputs.file_pattern }}"
          git push origin main --force
      
      - name: Create tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.run_id }}
          files: |
            archive.7z.*
            README.txt
      
      - name: Show download URL
        run: |
          echo ""
          echo "DOWNLOAD:"
          echo "https://codeload.github.com/${{ github.repository }}/zip/refs/tags/${{ github.run_id }}"
