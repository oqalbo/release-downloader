name: GitHub Release Fetcher (7z Multi-Volume - ALL FILES)

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target Repository (owner/repo)'
        required: true
      release_tag:
        description: 'Release Tag'
        required: true
      file_pattern:
        description: 'File Pattern (*.* for all files)'
        required: true
        default: '*.*'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Clean old files
        run: |
          find . -maxdepth 1 -type f -delete
          find . -maxdepth 1 -type d -not -name '.git' -not -name '.github' -not -name '.' -exec rm -rf {} + 2>/dev/null || true
          git checkout HEAD -- .github/workflows/fetcher.yml 2>/dev/null || true
      
      - name: Install p7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full
      
      - name: Download ALL files from release
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.event.inputs.target_repo }}
          tag: ${{ github.event.inputs.release_tag }}
          fileName: ${{ github.event.inputs.file_pattern }}
          out-file-path: "downloaded"
      
      - name: Archive ALL downloaded files into multi-volume 7z
        run: |
          # Check what was downloaded
          echo "Downloaded files:"
          ls -la downloaded/
          
          # Get total size
          TOTAL_SIZE=$(du -sb downloaded | cut -f1)
          echo "Total size: $TOTAL_SIZE bytes"
          
          # Archive ALL files in the downloaded folder
          7z a -v95m -mx9 archive.7z downloaded/*
          
          # Delete the downloaded folder
          rm -rf downloaded
          
          # Create manifest of what was archived
          cat > MANIFEST.txt << EOF
          Original files in this archive:
          EOF
          7z l archive.7z.001 >> MANIFEST.txt 2>/dev/null || true
          
          cat > README.txt << EOF
          ========================================
          MULTI-VOLUME 7z ARCHIVE - ALL FILES
          ========================================
          
          This archive contains ALL files downloaded from:
          ${{ github.event.inputs.target_repo }}
          Tag: ${{ github.event.inputs.release_tag }}
          Pattern: ${{ github.event.inputs.file_pattern }}
          
          Total volumes: $(ls archive.7z.* | wc -l)
          
          TO EXTRACT ON ANDROID:
          
          1. Download ALL volumes (archive.7z.001, archive.7z.002, etc.)
          2. Open ZArchiver or RAR
          3. Tap on archive.7z.001
          4. Extract to any folder
          
          All original files will be extracted.
          ========================================
          EOF
          
          echo "Created $(ls archive.7z.* | wc -l) volumes"
          ls -lh archive.7z.*
      
      - name: Delete ALL previous tags
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git fetch --tags
          TAGS=$(git tag)
          if [ -z "$TAGS" ]; then
            echo "No tags to delete"
            exit 0
          fi
          for tag in $TAGS; do
            echo "Deleting tag: $tag"
            git tag -d "$tag" 2>/dev/null || true
            git push origin --delete "$tag" 2>/dev/null || true
            if [ -n "$GH_TOKEN" ]; then
              curl -X DELETE \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$tag" \
                2>/dev/null || true
            fi
          done
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fetch: ALL files from ${{ github.event.inputs.target_repo }}:${{ github.event.inputs.release_tag }}"
          git push origin main --force
      
      - name: Create tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.run_id }}
          files: |
            archive.7z.*
            README.txt
            MANIFEST.txt
      
      - name: Show download URL
        run: |
          echo ""
          echo "========================================="
          echo "  DOWNLOAD URL:"
          echo "  https://codeload.github.com/${{ github.repository }}/zip/refs/tags/${{ github.run_id }}"
          echo ""
          echo "  This archive contains ALL files matching: ${{ github.event.inputs.file_pattern }}"
          echo "  Total volumes: $(ls archive.7z.* | wc -l)"
          echo ""
          echo "  Extract on Android with ZArchiver"
          echo "========================================="
