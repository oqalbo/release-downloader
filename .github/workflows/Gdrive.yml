name: Download & Upload to Google Drive

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL (direct link, GitHub release tag, or GitHub asset URL)'
        required: true
      filename:
        description: 'Optional: custom filename (without extension)'
        required: false

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install missing dependencies (only if needed)
        run: |
          # Check and install p7zip-full
          if ! command -v 7z &> /dev/null; then
            echo "Installing p7zip-full..."
            sudo apt-get update
            sudo apt-get install -y p7zip-full
          else
            echo "✅ p7zip-full already installed"
          fi
          
          # Check and install jq
          if ! command -v jq &> /dev/null; then
            echo "Installing jq..."
            sudo apt-get install -y jq
          else
            echo "✅ jq already installed"
          fi
          
          # Check and install wget
          if ! command -v wget &> /dev/null; then
            echo "Installing wget..."
            sudo apt-get install -y wget
          else
            echo "✅ wget already installed"
          fi
          
          # Check and install curl
          if ! command -v curl &> /dev/null; then
            echo "Installing curl..."
            sudo apt-get install -y curl
          else
            echo "✅ curl already installed"
          fi
          
          # Check and install unzip
          if ! command -v unzip &> /dev/null; then
            echo "Installing unzip..."
            sudo apt-get install -y unzip
          else
            echo "✅ unzip already installed"
          fi
          
          # Check and install gh CLI
          if ! command -v gh &> /dev/null; then
            echo "Installing gh CLI..."
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update && sudo apt install -y gh
          else
            echo "✅ gh CLI already installed"
          fi
          
          # Check and install gdrive CLI
          if ! command -v gdrive &> /dev/null; then
            echo "Installing gdrive CLI..."
            GDRIVE_VERSION="3.9.1"
            GDRIVE_URL="https://github.com/glotlabs/gdrive/releases/download/${GDRIVE_VERSION}/gdrive_linux_amd64.tar.gz"
            
            for i in 1 2 3; do
              wget -q --show-progress "$GDRIVE_URL" -O /tmp/gdrive.tar.gz && break || sleep 5
            done
            
            if [ -f /tmp/gdrive.tar.gz ]; then
              sudo tar -xzf /tmp/gdrive.tar.gz -C /usr/local/bin gdrive
              sudo chmod +x /usr/local/bin/gdrive
              rm -f /tmp/gdrive.tar.gz
            else
              echo "Failed to download gdrive"
              exit 1
            fi
          else
            echo "✅ gdrive CLI already installed"
          fi
          
          echo ""
          echo "📦 All dependencies ready:"
          echo "   7z: $(7z 2>&1 | head -1 | cut -d' ' -f1-2)"
          echo "   gh: $(gh --version | head -1)"
          echo "   gdrive: $(gdrive version 2>&1 | head -1 || echo 'installed')"
          echo "   jq: $(jq --version)"
          echo "   curl: $(curl --version | head -1)"
          echo "   wget: $(wget --version | head -1)"

      - name: Authenticate Google Drive
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        run: |
          echo "$GDRIVE_CREDENTIALS" > /tmp/gdrive_creds.json
          gdrive account import /tmp/gdrive_creds.json
          rm /tmp/gdrive_creds.json

      - name: Download file from URL
        id: download
        env:
          URL: ${{ github.event.inputs.url }}
          CUSTOM_NAME: ${{ github.event.inputs.filename }}
        run: |
          if [[ "$URL" =~ /releases/tag/ ]]; then
            echo "Processing GitHub release tag URL"
            REPO_PATH=$(echo "$URL" | sed -E 's|https?://github.com/([^/]+/[^/]+)/releases/tag/.*|\1|')
            TAG=$(echo "$URL" | sed -E 's|.*/releases/tag/||' | sed 's|/?$||')
            REPO_NAME=$(basename "$REPO_PATH")
            echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
            echo "SOURCE_TAG=$TAG" >> $GITHUB_ENV
            
            mkdir -p release_assets
            cd release_assets
            gh release download "$TAG" --repo "$REPO_PATH" --clobber
            cd ..
            zip -r "${REPO_NAME}-${TAG}.zip" release_assets
            rm -rf release_assets
            FINAL_NAME="${REPO_NAME}-${TAG}.zip"
            echo "FILE_NAME=$FINAL_NAME" >> $GITHUB_ENV
            echo "ORIGINAL_SOURCE=GitHub release tag: $REPO_PATH/$TAG" >> $GITHUB_ENV
            exit 0
          fi

          if [[ "$URL" =~ /releases/download/ ]]; then
            echo "Processing GitHub direct asset"
            OUTPUT_NAME=$(basename "$URL" | sed 's/\?.*//')
            [ -z "$OUTPUT_NAME" ] && OUTPUT_NAME="github_asset"
            curl -L -o "$OUTPUT_NAME" --fail --retry 3 "$URL"
            echo "FILE_NAME=$OUTPUT_NAME" >> $GITHUB_ENV
            echo "ORIGINAL_SOURCE=GitHub asset: $URL" >> $GITHUB_ENV
            exit 0
          fi

          echo "Processing direct link"
          if [ -n "$CUSTOM_NAME" ]; then
            OUTPUT_NAME="$CUSTOM_NAME"
          else
            OUTPUT_NAME=$(basename "$URL" | sed 's/\?.*//')
            [ -z "$OUTPUT_NAME" ] && OUTPUT_NAME="downloaded_file"
          fi
          curl -L -o "$OUTPUT_NAME" --fail --retry 3 "$URL"
          echo "FILE_NAME=$OUTPUT_NAME" >> $GITHUB_ENV
          echo "ORIGINAL_SOURCE=Direct URL: $URL" >> $GITHUB_ENV

      - name: Split file if larger than 100MB
        run: |
          FILE="$FILE_NAME"
          SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE" 2>/dev/null)
          echo "FILE_SIZE=$SIZE" >> $GITHUB_ENV
          if [ "$SIZE" -gt 104857600 ]; then
            echo "File exceeds 100MB, splitting into 95MB 7z volumes"
            7z a -v95m -mx9 archive.7z "$FILE"
            rm -f "$FILE"
            for f in archive.7z.0*; do
              mv "$f" "${f/archive.7z./chunk_}"
            done
            zip -r "${FILE%.*}_split.zip" chunk_*
            rm -f chunk_*
            FINAL_FILE="${FILE%.*}_split.zip"
            echo "SPLIT=true" >> $GITHUB_ENV
          else
            FINAL_FILE="$FILE"
            echo "SPLIT=false" >> $GITHUB_ENV
          fi
          echo "FINAL_FILE=$FINAL_FILE" >> $GITHUB_ENV
          echo "FINAL_SIZE=$(stat -c%s "$FINAL_FILE" 2>/dev/null || stat -f%z "$FINAL_FILE" 2>/dev/null)" >> $GITHUB_ENV

      - name: Upload to Google Drive
        run: |
          FILE_TO_UPLOAD="$FINAL_FILE"
          FOLDER_ID="1yvjCD6ZUmoxmadRopfG1vgXuUgnuSUAO"
          UPLOAD_OUTPUT=$(gdrive files upload --parent "$FOLDER_ID" "$FILE_TO_UPLOAD" 2>&1)
          echo "$UPLOAD_OUTPUT"
          
          FILE_ID=$(echo "$UPLOAD_OUTPUT" | grep -oP 'ID: \K[a-zA-Z0-9_-]+' | head -1)
          echo "DRIVE_FILE_ID=$FILE_ID" >> $GITHUB_ENV
          
          gdrive files share "$FILE_ID"
          SHARE_LINK=$(gdrive files link "$FILE_ID")
          echo "DRIVE_LINK=$SHARE_LINK" >> $GITHUB_ENV

      - name: Delete all previous release tags
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          RELEASES=$(gh release list --limit 100 --json tagName --jq '.[].tagName' | grep '^gdrive-upload-' || true)
          for tag in $RELEASES; do
            echo "Deleting old release: $tag"
            gh release delete "$tag" --yes || true
            git push origin --delete "$tag" 2>/dev/null || true
          done

      - name: Create GitHub Release with details
        uses: softprops/action-gh-release@v2
        with:
          tag_name: gdrive-upload-${{ github.run_id }}
          name: "📦 GDrive Upload - ${{ env.FILE_NAME }}"
          body: |
            ## ✅ Upload Complete
            
            | Detail | Value |
            |--------|-------|
            | **Original Source** | ${{ env.ORIGINAL_SOURCE }} |
            | **Downloaded File** | `${{ env.FILE_NAME }}` |
            | **Original Size** | ${{ env.FILE_SIZE }} bytes |
            | **Final File** | `${{ env.FINAL_FILE }}` |
            | **Final Size** | ${{ env.FINAL_SIZE }} bytes |
            | **Split Required** | ${{ env.SPLIT }} |
            | **Google Drive Folder ID** | `1yvjCD6ZUmoxmadRopfG1vgXuUgnuSUAO` |
            
            ### 🔗 Google Drive Link
            
            **[CLICK HERE TO DOWNLOAD FROM GOOGLE DRIVE](${{ env.DRIVE_LINK }})**
            
            ---
            *This release was automatically created by the GitHub Drive Uploader workflow.*
            *Run ID: ${{ github.run_id }}*
          draft: false
          prerelease: false
          generate_release_notes: false

      - name: Output result
        run: |
          echo ""
          echo "══════════════════════════════════════════════════════════════════"
          echo "✅ UPLOAD COMPLETE"
          echo "══════════════════════════════════════════════════════════════════"
          echo ""
          echo "📁 Google Drive Link:"
          echo "   $DRIVE_LINK"
          echo ""
          echo "🏷️  GitHub Release:"
          echo "   https://github.com/${{ github.repository }}/releases/tag/gdrive-upload-${{ github.run_id }}"
          echo ""
          echo "══════════════════════════════════════════════════════════════════"
